<!-- CSS-Main.html -->
<style>

.header {
  text-align: center;
  border-bottom: 2px solid var(--border);
  text-shadow: 0 0 10px var(--shadow), 0 0 20px var(--primary-bg);
  padding-bottom: .5em;
  margin-bottom: 1em;
}

.header h1 {
  font-size: 2em;
  color: var(--text);
  letter-spacing: 2px;
}

.header p {
  margin: 2px;
  color: var(--text-soft);
}

.text {
  text-align: center;
  // text-shadow: 0 0 10px var(--shadow), 0 0 20px var(--primary-bg);
}

.text h1 {
  font-size: 2em;
  color: var(--text);
  letter-spacing: 2px;
}

.text h2 {
  font-size: 1.8em;
  margin: 2px;
  color: var(--text-soft);
}

.text h3 {
  font-size: 1.6em;
  margin: 2px;
  color: var(--text-soft);
}

.text p {
  font-size: 1em;
  margin: 2px;
  color: var(--text-soft);
}

.text b {
  font-size: 1em;
  font-weight: 1000;  
  margin: 2px;
  color: var(--text);
}

.textBox {
  box-sizing: border-box;
  width: 100%;      
  height: 100%;
  text-align: center;
  border: 2px solid var(--border);
  padding: 1em;
  max-height: 40vh;
  max-width: 80vw;
  overflow-y: auto; 
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-wrap: break-word;
  border-collapse: collapse;
}

// Scrollbar
.textBox::-webkit-scrollbar {
  width: 10px;      
  height: 10px;    
}

/* Scrollbar track */
.textBox::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
}

/* Scrollbar thumb */
.textBox::-webkit-scrollbar-thumb {
  background-color: var(--primary);    /* thumb color */
  border-radius: 6px;
}

/* Scrollbar thumb hover */
.textBox::-webkit-scrollbar-thumb:hover {
  background-color: var(--primary-soft);
}

.user-text-input {
  padding: .2em;
  display: block;
  margin: 1em auto;
  width: 100%;
  max-width: 50vw;
  font-size: 1em;
  border: 2px solid var(--primary-soft);
  border-radius: 8px;
  background: var(--primary-bg);
  color: var(--text);
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  outline: none;
  box-sizing: border-box;
  font-family: monospace;

  resize: none; 

  height: 2em;
  overflow-y: hidden; 
  white-space: normal; 
  text-overflow: ellipsis;
}

.user-text-input::placeholder {
  color: var(--text-soft);
}

.user-text-input:focus {

  height: 20vh; 
  overflow-y: auto; 
  text-overflow: clip;

  border-color: var(--primary);
  box-shadow: 0 0 8px var(--primary);
  background: var(--background);
  color: var(--primary);
}

// Scrollbar
.user-text-input::-webkit-scrollbar {
  width: 10px;      
  height: 10px;    
}

/* Scrollbar track */
.user-text-input::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
}

/* Scrollbar thumb */
.user-text-input::-webkit-scrollbar-thumb {
  background-color: var(--primary);    /* thumb color */
  border-radius: 6px;
}

/* Scrollbar thumb hover */
.user-text-input::-webkit-scrollbar-thumb:hover {
  background-color: var(--primary-soft);
}

</style>
