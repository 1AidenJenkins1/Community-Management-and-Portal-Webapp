function rankToAbb(rank) {
  // Find the key in the object that matches
  const rankKey = Object.keys(RANK).find(key => RANK[key] == rank);
  
  // If a key is found, use that key to look up the abbreviation.
  if (rankKey && RANK_ABBREVIATION[rankKey]) {
    return RANK_ABBREVIATION[rankKey];
  }
  
  return null; // Return null if no match is found
}

function abbToRank(abb) {
  // Find the key in the object that matches
  const abbKey = Object.keys(RANK_ABBREVIATION).find(key => RANK_ABBREVIATION[key] == abb);

  // If a key is found, use that key to look up the rank.
  if (abbKey && RANK[abbKey]) {
    return RANK[abbKey];
  }
  
  return null; // Return null if no match is found
}

function getInputById(id) {
  const inputField = document.getElementById(id);
  
  if (inputField) {
    
    // Check if the element is a checkbox/radio
    if (inputField.type === "checkbox" || inputField.type === "radio") {
      // Return a boolean: true if checked, false otherwise
      return inputField.checked;
    }

    // Otherwise, assume it is a text input, textarea, select, etc.
    const input = inputField.value.trim();
    if (input === "") {
      return null;
    }
    return input;

  }
  // Throws error if the ID is not found in the DOM
  throw new Error(`No element with id ${id} found`);
}

// turn seconds to milliseconds
function sec_to_ms(seconds) {
  return seconds * 1000;
}

// helps with text markdown idk how this works ill look into it
function parseTextMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')   // bold --> **
    .replace(/\*(.*?)\*/g, '<i>$1</i>')       // italics --> *
    .replace(/\n\s*/g, '<br>');               // new lines --> /n
}
